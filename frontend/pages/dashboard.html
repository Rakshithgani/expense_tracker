<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Dashboard</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">💰 ExpenseTracker</h2>
            </div>

            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <p class="user-name" id="userName">User</p>
                    <p class="user-email" id="userEmail">user@example.com</p>
                </div>
            </div>

            <ul class="nav-menu">
                <li><a href="#" class="nav-link active" data-section="expenses">📊 Dashboard</a></li>
                <li><a href="#" class="nav-link" data-section="add-expense">➕ Add Expense</a></li>
            </ul>

            <button id="logoutBtn" class="btn btn-danger btn-block">Logout</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dashboard Section -->
            <section id="expenses" class="content-section active">
                <div class="dashboard-header">
                    <h1>Dashboard</h1>
                    <p class="subtitle">Manage your expenses</p>
                </div>

                <!-- Summary Cards -->
                <div class="summary-cards">
                    <div class="card stats-card">
                        <div class="card-icon">💵</div>
                        <div class="card-content">
                            <p class="card-label">Total Spent</p>
                            <p class="card-value" id="totalAmount">$0.00</p>
                        </div>
                    </div>

                    <div class="card stats-card">
                        <div class="card-icon">📝</div>
                        <div class="card-content">
                            <p class="card-label">Total Expenses</p>
                            <p class="card-value" id="totalCount">0</p>
                        </div>
                    </div>

                    <div class="card stats-card">
                        <div class="card-icon">📈</div>
                        <div class="card-content">
                            <p class="card-label">This Month</p>
                            <p class="card-value" id="monthAmount">$0.00</p>
                        </div>
                    </div>
                </div>

                <!-- Filter Section -->
                <div class="filter-section">
                    <h3>Filter Expenses</h3>
                    <div class="filter-controls">
                        <input 
                            type="text" 
                            id="categoryFilter" 
                            placeholder="Filter by category..."
                            class="filter-input"
                        >
                        <button class="btn btn-secondary" id="resetFilterBtn">Reset</button>
                    </div>
                </div>

                <!-- Expenses List -->
                <div class="expenses-section">
                    <h3>Your Expenses</h3>
                    <div id="expensesList" class="expenses-list">
                        <div class="empty-state">
                            <p>📭 No expenses yet. <a href="#" class="nav-link" data-section="add-expense">Add one now!</a></p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Add Expense Section -->
            <section id="add-expense" class="content-section">
                <div class="form-header">
                    <h1>Add New Expense</h1>
                    <p class="subtitle">Track your spending</p>
                </div>

                <form id="expenseForm" class="expense-form card">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="expenseTitle">Expense Title</label>
                            <input 
                                type="text" 
                                id="expenseTitle" 
                                name="title" 
                                placeholder="e.g., Grocery Shopping"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="expenseAmount">Amount ($)</label>
                            <input 
                                type="number" 
                                id="expenseAmount" 
                                name="amount" 
                                placeholder="0.00"
                                step="0.01"
                                min="0"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="expenseCategory">Category</label>
                            <select id="expenseCategory" name="category" required>
                                <option value="">Select a category</option>
                                <option value="Food">🍔 Food & Dining</option>
                                <option value="Transportation">🚗 Transportation</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Entertainment">🎭 Entertainment</option>
                                <option value="Bills">💳 Bills & Utilities</option>
                                <option value="Health">🏥 Health & Fitness</option>
                                <option value="Travel">✈️ Travel</option>
                                <option value="Education">📚 Education</option>
                                <option value="Other">📌 Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="expenseDate">Date</label>
                            <input 
                                type="date" 
                                id="expenseDate" 
                                name="date" 
                                required
                            >
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Add Expense</button>
                        <button type="reset" class="btn btn-secondary">Clear</button>
                    </div>

                    <div id="expenseMessage" class="message"></div>
                </form>
            </section>
        </main>
    </div>

    <script src="../scripts/auth.js"></script>
    <script src="../scripts/dashboard.js"></script>
</body>
</html>
