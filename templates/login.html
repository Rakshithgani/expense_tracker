<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker - Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">ExpenseTracker</h1>
            <p class="auth-subtitle">Track your expenses, manage your money</p>

            <div id="error-msg" class="error-msg hidden"></div>

            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="demo@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <p class="auth-footer">Don't have an account? <a href="/register">Sign Up</a></p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
