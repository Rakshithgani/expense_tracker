<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker - Sign Up</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">ExpenseTracker</h1>
            <p class="auth-subtitle">Create your account</p>

            <div id="error-msg" class="error-msg hidden"></div>

            <form id="register-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="/login">Sign In</a></p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
